version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: smartleads-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart-leads
    networks:
      - smartleads-network

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartleads-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: ${NODE_ENV:-production}
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - smartleads-network

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartleads-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - smartleads-network

volumes:
  mongodb_data:
    driver: local

networks:
  smartleads-network:
    driver: bridge
